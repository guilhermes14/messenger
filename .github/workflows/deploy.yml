name: CI/CD Pipeline - Push to Azure ACR

on:
  push:
    branches:
      - main
      - develop 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    needs: test 
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build User Service (Maven)
        run: mvn clean package -DskipTests
        working-directory: ./user

      - name: Build Sender Service (Maven)
        run: mvn clean package -DskipTests
        working-directory: ./sender

      - name: Login no Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push - User Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest ./user
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest

      - name: Build and Push - Sender Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/sender-service:latest ./sender
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/sender-service:latest